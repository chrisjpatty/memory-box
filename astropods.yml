# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: package/v1
name: memory-box
meta:
  visibility: private
agent:
  build:
    context: .
    dockerfile: Dockerfile
models:
  ollama:
    provider: ollama
    models: [nomic-embed-text]
  anthropic:
    provider: anthropic

knowledge:
  db:
    container:
      image: pgvector/pgvector:pg17
      port: 5432
      volume: /var/lib/postgresql/data
    persistent: true
    inputs:
      - name: POSTGRES_USER
        datatype: string
        default: postgres
      - name: POSTGRES_PASSWORD
        datatype: string
        default: postgres
      - name: POSTGRES_DB
        datatype: string
        default: memory_box
  files:
    container:
      build:
        context: .
        dockerfile: minio.Dockerfile
      port: 9000
      volume: /data
    persistent: true

ingestion:
  webhook:
    container:
      build:
        context: .
        dockerfile: ingestion/webhook/Dockerfile
    trigger:
      type: webhook

dev:
  interfaces:
    messaging:
      adapters: [web]
