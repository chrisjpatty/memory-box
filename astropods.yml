# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: package/v1
name: memory-box
meta:
  visibility: private
agent:
  build:
    context: .
    dockerfile: Dockerfile
  interfaces:
    frontend: true
    messaging: false
  inputs:
    - name: POSTGRES_HOST
      datatype: string
      default: knowledge-db
    - name: POSTGRES_USER
      datatype: string
      default: postgres
    - name: POSTGRES_PASSWORD
      datatype: string
      default: postgres
    - name: POSTGRES_DB
      datatype: string
      default: memory_box
    - name: MINIO_HOST
      datatype: string
      default: knowledge-files
models:
  ollama:
    provider: ollama
    models: [nomic-embed-text]
  anthropic:
    provider: anthropic

knowledge:
  db:
    container:
      image: pgvector/pgvector:pg17
      port: 5432
      volume: /var/lib/postgresql/data
    persistent: true
    inputs:
      - name: POSTGRES_USER
        datatype: string
        default: postgres
      - name: POSTGRES_PASSWORD
        datatype: string
        default: postgres
      - name: POSTGRES_DB
        datatype: string
        default: memory_box
  files:
    container:
      build:
        context: .
        dockerfile: minio.Dockerfile
      port: 9000
      volume: /data
    persistent: true

dev:
  interfaces:
    frontend:
      port: 3001
